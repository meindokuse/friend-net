version: "3.8"

services:
  user-service:
    build:
      context: ..
      dockerfile: user-service/Dockerfile
#    ports:
#      - "8081:8081"
    environment:
      - APP_ENV=local
      - HTTP_ADDR=:8081
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DATABASE=user_service
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=accounts.events
      - KAFKA_GROUP_ID=user-service
      - KAFKA_ENABLED=true
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - user-network
      - traefik-net
    labels:
      - "traefik.enable=true"
      
      # --- PUBLIC ROUTER (Регистрация и Поиск) ---
      - "traefik.http.routers.users-public.rule=Host(`localhost`) && ( (Path(`/users`) && Method(`POST`)) || PathPrefix(`/users/search`) || PathPrefix(`/users/username/`) )"
      - "traefik.http.routers.users-public.priority=100"
      - "traefik.http.routers.users-public.entrypoints=web"

      # --- PRIVATE ROUTER (Всё остальное: /users/me, /users/{id} и т.д.) ---
      - "traefik.http.routers.users-private.rule=Host(`localhost`) && PathPrefix(`/users`)"
      - "traefik.http.routers.users-private.priority=1"
      - "traefik.http.routers.users-private.entrypoints=web"
      
      # Навешиваем проверку токена только на приватный роутер
      - "traefik.http.routers.users-private.middlewares=jwt-auth@file,api-rate-limit@file"
      
      - "traefik.http.services.users.loadbalancer.server.port=8081"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - user-network

networks:
  user-network:
    driver: bridge
  traefik-net:
    external: true
