syntax = "proto3";

package auth.v1;

option go_package = "github.com/meindokuse/cloud-drive/auth-service/proto/authv1;authv1";

service AuthService {
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc GetAccountIDByToken(GetAccountIDByTokenRequest) returns (AccountIDResponse);
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  bool active = 1;
  string account_id = 2;
  string session_id = 3;
  int64 expires_at_unix = 4;
}

message GetAccountIDByTokenRequest {
  string access_token = 1;
}

message AccountIDResponse {
  bool active = 1;
  string account_id = 2;
}
