syntax = "proto3";

package auth.v1;

option go_package = "github.com/meindokuse/cloud-drive/auth-service/proto/authv1;authv1";

service AuthService {
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc GetUserIDByToken(GetUserIDByTokenRequest) returns (UserIDResponse);
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  bool active = 1;
  string user_id = 2;
  string session_id = 3;
  int64 expires_at_unix = 4;
}

message GetUserIDByTokenRequest {
  string access_token = 1;
}

message UserIDResponse {
  bool active = 1;
  string user_id = 2;
}
