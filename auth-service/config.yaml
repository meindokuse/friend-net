server:
  httpAddr: ":8080"
  shutdownTimeout: "10s"

controller:
  cookieDomain: ""
  cookieSecure: false
  refreshCookieName: "refresh_token"

postgres:
  host: "postgres"
  port: 5432
  user: "postgres"
  database: "auth_service"
  sslMode: "disable"
  maxOpenConns: 25
  maxIdleConns: 5
  connMaxLifetime: "5m"

redis:
  addr: "redis:6379"
  username: ""
  db: 0
  dialTimeout: "5s"
  readTimeout: "3s"
  writeTimeout: "3s"
  poolSize: 10

jwt:
  issuer: "auth-service"
  accessTTL: "15m"
  refreshTTL: "720h"

pass:
  cost: 10

oauth:
  google:
    redirectURL: "http://localhost:8080/auth/google/callback"
    scopes:
      - "openid"
      - "email"
      - "profile"
