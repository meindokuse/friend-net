services:
  postgres:
    image: postgres:17-alpine
    container_name: auth-service-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: auth_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: auth-service-redis
    env_file:
      - .env
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: migrate/migrate:v4.18.3
    container_name: auth-service-migrate
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/auth_service?sslmode=disable",
        "up"
      ]
    restart: "no"

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-service-app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  redis_data:
