version: '3.8'

services:
  auth-service-new:
    build:
      context: .
      dockerfile: Dockerfile
#    ports:
#      - "8081:8080"
    environment:
      - APP_ENV=local
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DATABASE=auth_service_new
      - REDIS_ADDR=redis:6379
      - JWT_SECRET=your-secret-key-must-be-at-least-32-characters-long
      - JWT_REFRESH_SECRET=your-refresh-secret-key-must-be-at-least-32-characters-long
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URL=http://localhost:8081/auth/google/callback
      - KAFKA_ENABLED=false
      - OUTBOX_FLUSH_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auth-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth-public.rule=Host(`api.example.com`) && PathPrefix(`/auth/register`, `/auth/login`, `/auth/refresh`, `/auth/introspect`, `/auth/google`, `/healthz`)"
      - "traefik.http.routers.auth-private.rule=Host(`api.example.com`) && PathPrefix(`/auth/logout`, `/auth/sessions`, `/auth/link`)"
      - "traefik.http.routers.auth-private.middlewares=jwt-auth@file"
      - "traefik.http.services.auth.loadbalancer.server.port=8080"

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=auth_service_new
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./tools/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - auth-network

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - auth-network

  # Uncomment when ready to use Kafka
  # zookeeper:
  #   image: confluentinc/cp-zookeeper:7.5.0
  #   environment:
  #     ZOOKEEPER_CLIENT_PORT: 2181
  #     ZOOKEEPER_TICK_TIME: 2000
  #   networks:
  #     - auth-network

  # kafka:
  #   image: confluentinc/cp-kafka:7.5.0
  #   depends_on:
  #     - zookeeper
  #   ports:
  #     - "9092:9092"
  #   environment:
  #     KAFKA_BROKER_ID: 1
  #     KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
  #     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
  #     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  #   networks:
  #     - auth-network

volumes:
  postgres_data:
  redis_data:

networks:
  auth-network:
    driver: bridge
