entryPoints:
  web:
    address: ":80"

api:
  dashboard: true
  insecure: true

log:
  level: DEBUG

# Логи доступа (покажут каждый запрос и 500-ку)
accessLog:
  format: common # или json

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: "traefik-net"
  file:
    directory: "/etc/traefik/dynamic"
    watch: true