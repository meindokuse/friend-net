injector:
  enabled: true

server:
  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        tls_disable = 1
        address     = "[::]:8200"
        cluster_address = "[::]:8201"
      }

      storage "file" {
        path = "/vault/data"
      }

  dataStorage:
    enabled: true
    size: 2Gi

  service:
    type: ClusterIP

  ingress:
    enabled: false

ui:
  enabled: true
  serviceType: ClusterIP
