apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-migrate
  namespace: friend-net
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: postgres:17-alpine
          command:
            - sh
            - -c
            - until pg_isready -h postgres -U postgres; do echo "waiting for postgres..."; sleep 2; done
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
      containers:
        - name: migrate
          image: postgres:17-alpine
          command:
            - sh
            - -c
            - psql -h postgres -U postgres -d auth_service_new -f /migrations/init.sql
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: migrations
          configMap:
            name: postgres-migrations
