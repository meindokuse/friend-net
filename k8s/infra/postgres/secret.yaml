# Секреты PostgreSQL управляются HashiCorp Vault.
# Этот файл НЕ применяется в кластер.
#
# Vault path: secret/data/friend-net/postgres
# Ключи:
#   postgres_user     — имя пользователя (обычно "postgres")
#   postgres_password — пароль
#   postgres_db       — имя базы данных (обычно "auth_service_new")
#
# Как записать секреты в Vault:
#   vault kv put secret/friend-net/postgres \
#     postgres_user="postgres" \
#     postgres_password="YOUR_STRONG_PASSWORD" \
#     postgres_db="auth_service_new"
