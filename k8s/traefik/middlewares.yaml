# ВАЖНО: требует установленных CRDs Traefik.
# Установить через Helm: helm repo add traefik https://traefik.github.io/charts && helm install traefik traefik/traefik -n friend-net

apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: jwt-auth
  namespace: friend-net
spec:
  forwardAuth:
    # ВАЖНО: auth-service должен иметь эндпоинт /auth/validate (или /auth/introspect)
    address: "http://auth-service.friend-net.svc.cluster.local:8080/auth/validate"
    trustForwardHeader: true
    authResponseHeaders:
      - "X-Account-ID"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: api-rate-limit
  namespace: friend-net
spec:
  rateLimit:
    average: 100
    burst: 50
