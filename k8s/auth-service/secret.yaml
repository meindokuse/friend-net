apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  namespace: friend-net
type: Opaque
stringData:
  POSTGRES_PASSWORD: postgres                                         # REPLACE
  JWT_SECRET: your-secret-key-must-be-at-least-32-characters-long    # REPLACE
  JWT_REFRESH_SECRET: your-refresh-secret-key-must-be-at-least-32-characters-long  # REPLACE
  GOOGLE_CLIENT_ID: your-google-client-id                            # REPLACE
  GOOGLE_CLIENT_SECRET: your-google-client-secret                    # REPLACE
