# Секреты auth-service управляются HashiCorp Vault.
# Этот файл НЕ применяется в кластер.
#
# Vault path: secret/data/friend-net/auth
# Ключи:
#   postgres_password   — пароль к PostgreSQL
#   jwt_secret          — HS256 ключ для access-токенов (мин. 32 символа)
#   jwt_refresh_secret  — HS256 ключ для refresh-токенов (мин. 32 символа)
#   google_client_id    — Google OAuth Client ID
#   google_client_secret — Google OAuth Client Secret
#
# Как записать секреты в Vault:
#   vault kv put secret/friend-net/auth \
#     postgres_password="..." \
#     jwt_secret="$(openssl rand -base64 32)" \
#     jwt_refresh_secret="$(openssl rand -base64 32)" \
#     google_client_id="..." \
#     google_client_secret="..."
