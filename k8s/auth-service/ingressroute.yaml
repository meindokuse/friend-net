apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: auth-preflight
  namespace: friend-net
spec:
  entryPoints:
    - web
  routes:
    - match: "PathPrefix(`/auth`) && Method(`OPTIONS`)"
      kind: Rule
      priority: 200
      middlewares:
        - name: cors
      services:
        - name: auth-service
          port: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: auth-public
  namespace: friend-net
spec:
  entryPoints:
    - web
  routes:
    - match: "PathPrefix(`/auth/register`) || PathPrefix(`/auth/login`) || PathPrefix(`/auth/refresh`) || PathPrefix(`/auth/introspect`) || PathPrefix(`/auth/google`) || PathPrefix(`/healthz`)"
      kind: Rule
      middlewares:
        - name: cors
      services:
        - name: auth-service
          port: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: auth-private
  namespace: friend-net
spec:
  entryPoints:
    - web
  routes:
    - match: "PathPrefix(`/auth/logout`) || PathPrefix(`/auth/sessions`) || PathPrefix(`/auth/link`) || PathPrefix(`/auth/linked`)"
      kind: Rule
      middlewares:
        - name: cors
        - name: jwt-auth
      services:
        - name: auth-service
          port: 8080
