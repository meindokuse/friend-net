apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: friend-net
data:
  APP_ENV: production
  HTTP_ADDR: ":8080"
  SHUTDOWN_TIMEOUT: "10s"
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_USER: postgres
  POSTGRES_DATABASE: auth_service_new
  POSTGRES_SSL_MODE: disable
  REDIS_ADDR: "redis:6379"
  REDIS_DB: "0"
  JWT_ISSUER: auth-service
  JWT_ACCESS_TTL: "15m"
  JWT_REFRESH_TTL: "720h"
  JWT_GRACE_PERIOD: "30s"
  PASS_COST: "10"
  COOKIE_SECURE: "true"
  REFRESH_COOKIE_NAME: refresh_token
  GOOGLE_REDIRECT_URL: "http://localhost/auth/google/callback"        # REPLACE с реальным доменом
  KAFKA_ENABLED: "true"
  KAFKA_BROKERS: "kafka.friend-net.svc.cluster.local:9092"
  KAFKA_TOPIC: accounts.events
  OUTBOX_FLUSH_ENABLED: "true"
  OUTBOX_FLUSH_INTERVAL: "5s"
  OUTBOX_BATCH_SIZE: "100"
