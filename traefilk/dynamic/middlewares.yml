http:
  middlewares:
    cors:
      headers:
        accessControlAllowOriginList:
          - "*"
        accessControlAllowMethods:
          - GET
          - POST
          - OPTIONS
        accessControlAllowHeaders:
          - Authorization
          - Content-Type
          - X-Request-Id
        addVaryHeader: true
        accessControlMaxAge: 100

    auth:
      forwardAuth:
        address: "http://auth-service:8080/validate"
        trustForwardHeader: true
        authResponseHeaders:
          - X-User-Id
          - X-User-Role

    # (Traefik сам ведёт accessLog, дополнительное логирование в middleware обычно не нужно)